<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Orders | ZENVY Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-drip" id="mainNavbar"></nav>

  <section class="section-drip" style="padding-top:2rem;">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
          <h1 class="fw-bold" style="font-size:1.8rem;">
            <i class="bi bi-receipt text-gradient me-2"></i>Manage Orders
          </h1>
          <p class="text-muted mb-0">View and manage all customer orders</p>
        </div>
        <div>
          <select class="form-select" id="orderStatusFilter" onchange="loadAdminOrders()"
            style="background:var(--bg-card); color:var(--text-primary); border-color:var(--border-color); width:auto;">
            <option value="">All Orders</option>
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
      </div>

      <div class="profile-card">
        <div class="table-responsive" id="adminOrdersTable">
          <table class="table-drip">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Amount</th>
                <th>Payment</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="adminOrdersBody">
              <tr><td colspan="7" class="text-center py-4"><div class="spinner-drip"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer-drip" id="mainFooter"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
