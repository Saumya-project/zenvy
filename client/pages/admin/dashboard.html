<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | DRIP STORE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-drip" id="mainNavbar"></nav>

  <section class="section-drip" style="padding-top:2rem;">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="fw-bold" style="font-size:1.8rem;">
            <i class="bi bi-speedometer2 text-gradient me-2"></i>Admin Dashboard
          </h1>
          <p class="text-muted mb-0">Welcome back, Admin 👑</p>
        </div>
        <div class="d-flex gap-2">
          <a href="/pages/admin/products.html" class="btn btn-drip-outline btn-drip-sm">
            <i class="bi bi-box-seam me-1"></i>Products
          </a>
          <a href="/pages/admin/orders.html" class="btn btn-drip-outline btn-drip-sm">
            <i class="bi bi-receipt me-1"></i>Orders
          </a>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="row g-3 mb-4" id="adminStats">
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(16, 185, 129, 0.15); color:var(--accent-green);">
              <i class="bi bi-currency-rupee"></i>
            </div>
            <div class="stat-value text-gradient" id="statRevenue">₹0</div>
            <div class="stat-label">Total Revenue</div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(168, 85, 247, 0.15); color:var(--accent-purple);">
              <i class="bi bi-receipt"></i>
            </div>
            <div class="stat-value" id="statOrders">0</div>
            <div class="stat-label">Total Orders</div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(34, 211, 238, 0.15); color:var(--accent-cyan);">
              <i class="bi bi-box-seam"></i>
            </div>
            <div class="stat-value" id="statProducts">0</div>
            <div class="stat-label">Total Products</div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(236, 72, 153, 0.15); color:var(--accent-pink);">
              <i class="bi bi-people"></i>
            </div>
            <div class="stat-value" id="statUsers">0</div>
            <div class="stat-label">Total Users</div>
          </div>
        </div>
      </div>

      <!-- Recent Orders -->
      <div class="profile-card">
        <h5 class="fw-bold mb-3">Recent Orders</h5>
        <div class="table-responsive">
          <table class="table-drip">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="recentOrdersBody">
              <tr><td colspan="6" class="text-center py-4"><div class="spinner-drip"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer-drip" id="mainFooter"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
