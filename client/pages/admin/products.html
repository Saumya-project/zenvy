<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products | ZENVY Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-drip" id="mainNavbar"></nav>

  <section class="section-drip" style="padding-top:2rem;">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
          <h1 class="fw-bold" style="font-size:1.8rem;">
            <i class="bi bi-box-seam text-gradient me-2"></i>Manage Products
          </h1>
          <p class="text-muted mb-0">Add, edit, and manage your product catalog</p>
        </div>
        <div class="d-flex gap-2">
          <div class="search-bar" style="min-width:200px;">
            <i class="bi bi-search text-muted"></i>
            <input type="text" id="adminProductSearch" placeholder="Search products...">
          </div>
          <button class="btn btn-drip" onclick="openAddProductModal()">
            <i class="bi bi-plus-lg me-1"></i>Add Product
          </button>
        </div>
      </div>

      <div class="profile-card">
        <div class="table-responsive" id="adminProductsTable">
          <table class="table-drip">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminProductsBody">
              <tr><td colspan="7" class="text-center py-4"><div class="spinner-drip"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <!-- Product Modal -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="productModalLabel">Add New Product</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="productForm">
            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label text-muted">Product Name</label>
                <input type="text" class="form-control" id="prodName" required
                  style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
              </div>
              <div class="col-md-4">
                <label class="form-label text-muted">Category</label>
                <select class="form-select" id="prodCategory" required
                  style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
                  <option value="tshirt">T-Shirt</option>
                  <option value="hoodie">Hoodie</option>
                  <option value="jogger">Jogger</option>
                  <option value="co-ord">Co-ord</option>
                  <option value="accessories">Accessories</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label text-muted">Description</label>
                <textarea class="form-control" id="prodDesc" rows="3" required
                  style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);"></textarea>
              </div>
              <div class="col-md-4">
                <label class="form-label text-muted">Price (₹)</label>
                <input type="number" class="form-control" id="prodPrice" min="0" required
                  style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
              </div>
              <div class="col-md-4">
                <label class="form-label text-muted">Discount Price (₹)</label>
                <input type="number" class="form-control" id="prodDiscountPrice" min="0"
                  style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
              </div>
              <div class="col-md-4">
                <label class="form-label text-muted">Tags (comma separated)</label>
                <input type="text" class="form-control" id="prodTags" placeholder="streetwear, trending"
                  style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
              </div>
              <div class="col-12">
                <label class="form-label text-muted">Sizes & Stock</label>
                <div id="sizesContainer"></div>
                <button type="button" class="btn btn-drip-outline btn-drip-sm mt-2" onclick="addSizeRow()">
                  <i class="bi bi-plus me-1"></i>Add Size
                </button>
              </div>
              <div class="col-md-8">
                <label class="form-label text-muted">Product Images</label>
                <input type="file" class="form-control" id="prodImages" multiple accept="image/*"
                  style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
              </div>
              <div class="col-md-4 d-flex align-items-end">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="prodFeatured" style="background-color:var(--bg-secondary); border-color:var(--border-color);">
                  <label class="form-check-label text-muted" for="prodFeatured">Featured Product</label>
                </div>
              </div>
            </div>
            <div class="mt-4">
              <button type="submit" class="btn btn-drip">Add Product</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer-drip" id="mainFooter"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
