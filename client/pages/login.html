<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your DRIP STORE account to shop and track orders.">
  <title>Login | DRIP STORE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-drip" id="mainNavbar"></nav>

  <section class="section-drip d-flex align-items-center" style="min-height: 70vh;">
    <div class="container">
      <div class="form-drip">
        <div class="text-center mb-4">
          <h3 class="text-gradient">Welcome Back</h3>
          <p class="form-subtitle">Login to continue your drip journey</p>
        </div>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label" for="loginEmail">Email</label>
            <input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label" for="loginPassword">Password</label>
            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-drip w-100">Login</button>
        </form>
        <p class="text-center mt-3 text-muted">
          Don't have an account? <a href="/pages/register.html">Create one</a>
        </p>
        <hr class="border-secondary">
        <div class="text-center">
          <small class="text-muted">Demo Users:<br>
            Admin: admin@dripstore.com / admin123<br>
            User: user@dripstore.com / user1234
          </small>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer-drip" id="mainFooter"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
