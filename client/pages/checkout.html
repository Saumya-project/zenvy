<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Checkout at DRIP STORE. Enter your shipping address and complete payment.">
  <title>Checkout | DRIP STORE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-drip" id="mainNavbar"></nav>

  <section class="section-drip" style="padding-top:2rem;">
    <div class="container">
      <h1 class="fw-bold mb-4" style="font-size:1.8rem;">
        <i class="bi bi-credit-card text-gradient me-2"></i>Checkout
      </h1>
      <div class="row">
        <div class="col-lg-7">
          <!-- Saved Addresses -->
          <div class="mb-4">
            <h5 class="fw-bold mb-3">Saved Addresses</h5>
            <div id="savedAddresses">
              <p class="text-muted">Loading...</p>
            </div>
          </div>

          <!-- Address Form -->
          <div class="profile-card">
            <h5 class="fw-bold mb-3">Shipping Address</h5>
            <form id="checkoutForm">
              <div class="mb-3">
                <label class="form-label text-muted" for="street">Street Address</label>
                <input type="text" class="form-control" id="street" placeholder="123, Main Street, Apt 4B" required
                  style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label class="form-label text-muted" for="city">City</label>
                  <input type="text" class="form-control" id="city" placeholder="Mumbai" required
                    style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
                </div>
                <div class="col-md-4">
                  <label class="form-label text-muted" for="state">State</label>
                  <input type="text" class="form-control" id="state" placeholder="Maharashtra" required
                    style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
                </div>
                <div class="col-md-4">
                  <label class="form-label text-muted" for="pincode">Pincode</label>
                  <input type="text" class="form-control" id="pincode" placeholder="400001" required
                    style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
                </div>
              </div>
              <button type="submit" class="btn btn-drip w-100 mt-2" id="payBtn">
                <i class="bi bi-bag-check-fill me-2"></i>Place Order
              </button>
            </form>
          </div>
        </div>

        <div class="col-lg-5" id="checkoutSummary">
          <div class="text-center py-5"><div class="spinner-drip"></div></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer-drip" id="mainFooter"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/checkout.js"></script>
</body>
</html>
