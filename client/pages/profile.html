<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your DRIP STORE profile. View orders, manage addresses, and update your info.">
  <title>Profile | DRIP STORE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-drip" id="mainNavbar"></nav>

  <section class="section-drip" style="padding-top:2rem;">
    <div class="container">
      <h1 class="fw-bold mb-4" style="font-size:1.8rem;">
        <i class="bi bi-person-circle text-gradient me-2"></i>My Profile
      </h1>

      <div class="row g-4">
        <!-- Profile Info -->
        <div class="col-lg-4">
          <div class="profile-card" id="profileInfo">
            <div class="text-center py-4"><div class="spinner-drip"></div></div>
          </div>

          <!-- Addresses -->
          <div class="profile-card mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="fw-bold mb-0">Saved Addresses</h5>
              <button class="btn btn-drip btn-drip-sm" onclick="document.getElementById('addAddressSection').style.display='block'">
                <i class="bi bi-plus"></i> Add
              </button>
            </div>
            <div id="addressList">Loading...</div>
            
            <div id="addAddressSection" style="display:none;" class="mt-3 p-3" style="background:var(--bg-secondary); border-radius:var(--radius-sm);">
              <h6 class="fw-bold mb-2">Add Address</h6>
              <form id="addAddressForm" onsubmit="handleAddAddress(event)">
                <input type="text" class="form-control mb-2" id="addrLabel" placeholder="Label (Home, Work...)" style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
                <input type="text" class="form-control mb-2" id="addrStreet" placeholder="Street" required style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
                <div class="row g-2 mb-2">
                  <div class="col-6"><input type="text" class="form-control" id="addrCity" placeholder="City" required style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);"></div>
                  <div class="col-6"><input type="text" class="form-control" id="addrState" placeholder="State" required style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);"></div>
                </div>
                <input type="text" class="form-control mb-2" id="addrPincode" placeholder="Pincode" required style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
                <button type="submit" class="btn btn-drip btn-drip-sm w-100">Save Address</button>
              </form>
            </div>
          </div>
        </div>

        <!-- Order History -->
        <div class="col-lg-8">
          <div class="profile-card">
            <h5 class="fw-bold mb-3">Order History</h5>
            <div id="orderHistory">
              <div class="text-center py-4"><div class="spinner-drip"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer-drip" id="mainFooter"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn()) {
        showToast('Please login first', 'error');
        setTimeout(() => window.location.href = '/pages/login.html', 1000);
        return;
      }
      loadProfile();
      loadAddresses();
      loadOrderHistory();
    });

    async function loadProfile() {
      const container = document.getElementById('profileInfo');
      try {
        const res = await apiGet('/auth/me');
        const user = res.data;
        container.innerHTML = `
          <div class="text-center">
            <div class="profile-avatar mx-auto">${user.name.charAt(0).toUpperCase()}</div>
            <h4 class="fw-bold">${user.name}</h4>
            <p class="text-muted">${user.email}</p>
            <span class="tag-badge">${user.role}</span>
          </div>
          <hr class="border-secondary my-3">
          <form id="editProfileForm" onsubmit="handleUpdateProfile(event)">
            <div class="mb-2">
              <label class="form-label text-muted" for="editName">Name</label>
              <input type="text" class="form-control" id="editName" value="${user.name}" style="background:var(--bg-secondary); color:var(--text-primary); border-color:var(--border-color);">
            </div>
            <button type="submit" class="btn btn-drip btn-drip-sm w-100 mt-2">Update Profile</button>
          </form>
        `;
      } catch (err) {
        container.innerHTML = `<p class="text-danger">${err.message}</p>`;
      }
    }

    async function handleUpdateProfile(e) {
      e.preventDefault();
      try {
        const name = document.getElementById('editName').value.trim();
        await apiPut('/auth/profile', { name });
        const user = getUser();
        user.name = name;
        localStorage.setItem('drip_user', JSON.stringify(user));
        showToast('Profile updated! ✨');
        renderNavbar();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function loadAddresses() {
      const container = document.getElementById('addressList');
      try {
        const res = await apiGet('/auth/me');
        const addresses = res.data.addresses || [];
        if (addresses.length === 0) {
          container.innerHTML = '<p class="text-muted">No saved addresses</p>';
          return;
        }
        container.innerHTML = addresses.map(addr => `
          <div class="address-card">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="address-label">${addr.label || 'Address'}</div>
                <div class="text-secondary">${addr.street}, ${addr.city}</div>
                <div class="text-muted">${addr.state} - ${addr.pincode}</div>
              </div>
              <button class="btn btn-sm text-danger" onclick="deleteAddress('${addr._id}')">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = `<p class="text-muted">Failed to load</p>`;
      }
    }

    async function handleAddAddress(e) {
      e.preventDefault();
      try {
        await apiPost('/auth/address', {
          label: document.getElementById('addrLabel').value || 'Home',
          street: document.getElementById('addrStreet').value,
          city: document.getElementById('addrCity').value,
          state: document.getElementById('addrState').value,
          pincode: document.getElementById('addrPincode').value,
        });
        showToast('Address added! 📍');
        document.getElementById('addAddressForm').reset();
        document.getElementById('addAddressSection').style.display = 'none';
        loadAddresses();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function deleteAddress(id) {
      try {
        await apiDelete(`/auth/address/${id}`);
        showToast('Address removed');
        loadAddresses();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function loadOrderHistory() {
      const container = document.getElementById('orderHistory');
      try {
        const res = await apiGet('/orders/my');
        const orders = res.data || [];

        if (orders.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📦</div>
              <h4>No orders yet</h4>
              <p>Start shopping to see your orders here</p>
              <a href="/pages/shop.html" class="btn btn-drip mt-2">Shop Now</a>
            </div>
          `;
          return;
        }

        container.innerHTML = `
          <div class="table-responsive">
            <table class="table-drip">
              <thead>
                <tr>
                  <th>Order ID</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>
                ${orders.map(order => `
                  <tr>
                    <td><small>#${order._id.slice(-8)}</small></td>
                    <td>${order.items.map(i => i.name || 'Product').join(', ')}</td>
                    <td class="fw-bold">${formatPrice(order.totalAmount)}</td>
                    <td><span class="status-badge status-${order.orderStatus}">${order.orderStatus}</span></td>
                    <td><small>${new Date(order.createdAt).toLocaleDateString()}</small></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (err) {
        container.innerHTML = `<p class="text-danger">${err.message}</p>`;
      }
    }
  </script>
</body>
</html>
