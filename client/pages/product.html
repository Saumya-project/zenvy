<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View product details, choose your size, and read reviews at Zenvy.">
  <title>Product | ZENVY</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-drip" id="mainNavbar"></nav>

  <section class="section-drip" style="padding-top: 2rem;">
    <div class="container">
      <div id="productDetail">
        <div class="text-center py-5"><div class="spinner-drip"></div></div>
      </div>
    </div>
  </section>

  <footer class="footer-drip" id="mainFooter"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script>
    let currentProduct = null;
    let selectedSize = '';

    document.addEventListener('DOMContentLoaded', loadProductDetail);

    async function loadProductDetail() {
      const container = document.getElementById('productDetail');
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');

      if (!productId) {
        container.innerHTML = '<div class="empty-state"><h4>Product not found</h4><a href="/pages/shop.html" class="btn btn-drip mt-3">Back to Shop</a></div>';
        return;
      }

      try {
        const res = await apiGet(`/products/${productId}`);
        currentProduct = res.data;
        document.title = `${currentProduct.name} | DRIP STORE`;
        renderProduct(currentProduct);
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">😰</div><h4>Failed to load product</h4><p>${err.message}</p><a href="/pages/shop.html" class="btn btn-drip mt-3">Back to Shop</a></div>`;
      }
    }

    function renderProduct(product) {
      const container = document.getElementById('productDetail');
      const mainImg = product.images?.[0]?.url || 'https://via.placeholder.com/600';
      const discountPercent = product.discountPrice ? Math.round((1 - product.discountPrice / product.price) * 100) : 0;

      container.innerHTML = `
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
          <ol class="breadcrumb" style="background:transparent;">
            <li class="breadcrumb-item"><a href="/pages/index.html">Home</a></li>
            <li class="breadcrumb-item"><a href="/pages/shop.html">Shop</a></li>
            <li class="breadcrumb-item"><a href="/pages/shop.html?category=${product.category}">${product.category}</a></li>
            <li class="breadcrumb-item active text-muted">${product.name}</li>
          </ol>
        </nav>

        <div class="row g-4">
          <!-- Image Gallery -->
          <div class="col-lg-6">
            <div class="product-gallery">
              <div class="thumbnails">
                ${product.images.map((img, i) => `
                  <div class="thumb ${i === 0 ? 'active' : ''}" onclick="changeMainImage('${img.url}', this)">
                    <img src="${img.url}" alt="Thumbnail ${i + 1}">
                  </div>
                `).join('')}
              </div>
              <div class="main-image">
                <img src="${mainImg}" alt="${product.name}" id="mainProductImage">
              </div>
            </div>
          </div>

          <!-- Product Info -->
          <div class="col-lg-6">
            <span class="product-category" style="font-size:0.9rem;">${product.category}</span>
            <h1 class="fw-bold mt-1 mb-2" style="font-size:2rem; letter-spacing:-0.5px;">${product.name}</h1>
            
            <div class="product-rating mb-3" style="font-size:1rem;">
              <span class="stars">${starRating(product.ratings?.average || 0)}</span>
              <span class="text-muted ms-1">${product.ratings?.average || 0} (${product.ratings?.count || 0} reviews)</span>
            </div>

            <div class="d-flex align-items-center gap-3 mb-4">
              <span class="fs-2 fw-bold text-gradient">${formatPrice(product.discountPrice || product.price)}</span>
              ${product.discountPrice ? `
                <span class="text-muted text-decoration-line-through fs-5">${formatPrice(product.price)}</span>
                <span class="discount-badge" style="position:static;">${discountPercent}% OFF</span>
              ` : ''}
            </div>

            <p class="text-secondary mb-4">${product.description}</p>

            <!-- Tags -->
            ${product.tags && product.tags.length > 0 ? `
              <div class="mb-4">
                ${product.tags.map(tag => `<span class="tag-badge">${tag}</span>`).join(' ')}
              </div>
            ` : ''}

            <!-- Size Selector -->
            <div class="mb-4">
              <h6 class="fw-bold mb-2">Select Size</h6>
              <div class="size-selector">
                ${product.sizes.map(s => `
                  <button class="size-btn ${s.stock <= 0 ? 'disabled' : ''}" 
                    data-size="${s.size}" data-stock="${s.stock}"
                    ${s.stock <= 0 ? 'disabled' : ''}
                    onclick="selectSize('${s.size}', this)">
                    ${s.size}
                  </button>
                `).join('')}
              </div>
              <small class="text-muted mt-1 d-block" id="stockInfo"></small>
            </div>

            <!-- Add to Cart -->
            <div class="d-flex gap-3 mb-4">
              <button class="btn btn-drip flex-grow-1" id="addToCartBtn" onclick="handleAddToCart()">
                <i class="bi bi-bag-plus me-2"></i>Add to Cart
              </button>
            </div>

            <!-- Features -->
            <div class="row g-2 mt-2">
              <div class="col-4">
                <div class="text-center p-2" style="background:var(--bg-card); border-radius:var(--radius-sm);">
                  <i class="bi bi-truck text-purple"></i>
                  <small class="d-block text-muted mt-1">Free Delivery</small>
                </div>
              </div>
              <div class="col-4">
                <div class="text-center p-2" style="background:var(--bg-card); border-radius:var(--radius-sm);">
                  <i class="bi bi-arrow-counterclockwise text-purple"></i>
                  <small class="d-block text-muted mt-1">7 Day Returns</small>
                </div>
              </div>
              <div class="col-4">
                <div class="text-center p-2" style="background:var(--bg-card); border-radius:var(--radius-sm);">
                  <i class="bi bi-shield-check text-purple"></i>
                  <small class="d-block text-muted mt-1">Genuine Product</small>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Reviews Section -->
        <div class="mt-5">
          <h3 class="fw-bold mb-4">Customer Reviews</h3>
          
          ${isLoggedIn() ? `
            <div class="review-card mb-4" style="background:var(--bg-secondary);">
              <h6 class="fw-bold mb-3">Write a Review</h6>
              <form id="reviewForm" onsubmit="submitReview(event)">
                <div class="mb-3">
                  <label class="form-label text-muted">Rating</label>
                  <div class="d-flex gap-1" id="ratingStars">
                    ${[1,2,3,4,5].map(i => `
                      <i class="bi bi-star fs-4" style="cursor:pointer; color:var(--text-muted);" 
                        data-rating="${i}" onclick="setRating(${i})"></i>
                    `).join('')}
                  </div>
                  <input type="hidden" id="reviewRating" value="0">
                </div>
                <div class="mb-3">
                  <textarea class="form-control" id="reviewComment" rows="3" placeholder="Share your thoughts..." style="background:var(--bg-card); color:var(--text-primary); border-color:var(--border-color);"></textarea>
                </div>
                <button type="submit" class="btn btn-drip btn-drip-sm">Submit Review</button>
              </form>
            </div>
          ` : `
            <div class="review-card mb-4 text-center" style="background:var(--bg-secondary);">
              <p class="mb-2">Login to write a review</p>
              <a href="/pages/login.html" class="btn btn-drip btn-drip-sm">Login</a>
            </div>
          `}

          <div id="reviewsList">
            ${(product.reviews || []).map(r => `
              <div class="review-card">
                <div class="d-flex justify-content-between">
                  <div class="reviewer-name">${r.user?.name || 'Anonymous'}</div>
                  <div class="review-date">${new Date(r.createdAt).toLocaleDateString()}</div>
                </div>
                <div class="review-stars">${starRating(r.rating)}</div>
                <p class="mb-0 text-secondary">${r.comment || ''}</p>
              </div>
            `).join('') || '<p class="text-muted">No reviews yet. Be the first to review!</p>'}
          </div>
        </div>
      `;
    }

    function changeMainImage(url, thumbEl) {
      document.getElementById('mainProductImage').src = url;
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      thumbEl.classList.add('active');
    }

    function selectSize(size, btn) {
      selectedSize = size;
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const stock = btn.dataset.stock;
      document.getElementById('stockInfo').textContent = `${stock} in stock`;
    }

    function handleAddToCart() {
      if (!selectedSize) {
        showToast('Please select a size', 'error');
        return;
      }
      addToCartHandler(currentProduct._id, selectedSize, 1, {
        name: currentProduct.name,
        price: currentProduct.price,
        discountPrice: currentProduct.discountPrice,
        image: currentProduct.images?.[0]?.url || '',
      });
    }

    let selectedRating = 0;

    function setRating(rating) {
      selectedRating = rating;
      document.getElementById('reviewRating').value = rating;
      document.querySelectorAll('#ratingStars i').forEach((star, i) => {
        star.className = i < rating ? 'bi bi-star-fill fs-4' : 'bi bi-star fs-4';
        star.style.color = i < rating ? 'var(--accent-orange)' : 'var(--text-muted)';
      });
    }

    async function submitReview(e) {
      e.preventDefault();
      const rating = selectedRating;
      const comment = document.getElementById('reviewComment').value.trim();

      if (rating === 0) {
        showToast('Please select a rating', 'error');
        return;
      }

      try {
        await apiPost(`/products/${currentProduct._id}/reviews`, { rating, comment });
        showToast('Review submitted! ⭐');
        loadProductDetail();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }
  </script>
</body>
</html>
