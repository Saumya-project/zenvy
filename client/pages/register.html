<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Zenvy account and start shopping Gen-Z streetwear.">
  <title>Register | ZENVY</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-drip" id="mainNavbar"></nav>

  <section class="section-drip d-flex align-items-center" style="min-height: 70vh;">
    <div class="container">
      <div class="form-drip">
        <div class="text-center mb-4">
          <h3 class="text-gradient">Join the Zenvy</h3>
          <p class="form-subtitle">Create an account to start shopping</p>
        </div>
        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label" for="regName">Full Name</label>
            <input type="text" class="form-control" id="regName" placeholder="Your Name" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="regEmail">Email</label>
            <input type="email" class="form-control" id="regEmail" placeholder="your@email.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="regPassword">Password</label>
            <input type="password" class="form-control" id="regPassword" placeholder="Min 6 characters" required minlength="6">
          </div>
          <div class="mb-4">
            <label class="form-label" for="regConfirmPassword">Confirm Password</label>
            <input type="password" class="form-control" id="regConfirmPassword" placeholder="Repeat password" required>
          </div>
          <button type="submit" class="btn btn-drip w-100">Create Account</button>
        </form>
        <p class="text-center mt-3 text-muted">
          Already have an account? <a href="/pages/login.html">Login</a>
        </p>
      </div>
    </div>
  </section>

  <footer class="footer-drip" id="mainFooter"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
